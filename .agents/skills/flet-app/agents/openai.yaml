interface:
  display_name: "Flet App"
  short_description: "Flet 0.82.x declarative app development (state, hooks, navigation, theming, async)."
  brand_color: "#0EA5E9"
  default_prompt: |
    Use this skill when building or reviewing a Python app with Flet declarative UI (0.82.x+).
    Priorities:
    - Use ft.run(main), page.render/page.render_views (no page.update in declarative mode)
    - Correct hook usage (@ft.component, no conditional hooks)
    - Clean state boundaries (@ft.observable @dataclass for shared, ft.use_state for local)
policy:
  allow_implicit_invocation: true

