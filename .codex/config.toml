#:schema https://developers.openai.com/codex/config-schema.json
#
# Project-local Codex config for this repo (Flet skill pack).
# Inspired by Everything Claude Code (ECC) by affaan-m:
# https://github.com/affaan-m/everything-claude-code/tree/main/.codex

# Model selection (adjust to taste).
model = "o4-mini"
model_provider = "openai"

# Runtime defaults.
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

[features]
multi_agent = true

[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"

# Optional: multi-agent roles (uncomment to activate).
# [agents]
# max_threads = 6
# max_depth = 1
#
# [agents.explorer]
# description = "Read-only codebase explorer for gathering evidence before changes are proposed."
# config_file = "agents/explorer.toml"
#
# [agents.reviewer]
# description = "PR reviewer focused on correctness, security, and missing tests."
# config_file = "agents/reviewer.toml"
#
# [agents.docs_researcher]
# description = "Documentation specialist that verifies APIs, framework behavior, and release notes."
# config_file = "agents/docs-researcher.toml"
#
# [agents.flet_app_builder]
# description = "Flet declarative app builder (Flet 0.83.x+)."
# config_file = "agents/flet-app-builder.toml"
#
# [agents.flet_extension_builder]
# description = "Flet extension package builder (Service/UI Controls)."
# config_file = "agents/flet-extension-builder.toml"
